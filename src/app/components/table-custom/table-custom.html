<div class="w-full overflow-x-auto rounded-2xl">

  <table mat-table [dataSource]="dataSource" class="w-full">

    <ng-container
      *ngFor="let column of columns"
      [matColumnDef]="column.key"
    >
      <th mat-header-cell *matHeaderCellDef>
        {{ column.label }}
      </th>

      <td mat-cell *matCellDef="let element">

        <ng-container [ngSwitch]="column.type">

          <app-badge-component
            *ngSwitchCase="'badge'"
            [estado]="element[column.key]"
          ></app-badge-component>

          <span *ngSwitchDefault>
            {{ element[column.key] || '-' }}
          </span>

        </ng-container>

      </td>
    </ng-container>

    <!-- Columna de acciones -->
    <ng-container [matColumnDef]="'__actions'" *ngIf="actions.length > 0">
      <th mat-header-cell *matHeaderCellDef>
        Acciones
      </th>

      <td mat-cell *matCellDef="let element; let i = index">
        <div class="flex items-center gap-2">

          <ng-container *ngFor="let action of actions">

            <button
              *ngIf="isActionVisible(action, element)"
              type="button"
              [disabled]="isActionDisabled(action, element)"
              (click)="onActionClick(action, element, i)"
              class="botton"
              [ngClass]="action.class"
            >
              {{ action.label }}
            </button>

          </ng-container>

        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <mat-paginator
    [pageSizeOptions]="[1, 5, 10, 20]"
    [pageSize]="10"
    showFirstLastButtons
    aria-label="Paginación de tabla">
  </mat-paginator>

</div>
